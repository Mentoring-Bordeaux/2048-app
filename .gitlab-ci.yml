# GitLab CI equivalent of .github/workflows/ci.yaml
#
# Predefined variables used:
#   CI_COMMIT_BRANCH     - branch name on push
#   CI_PIPELINE_SOURCE   - "push" | "merge_request_event" | "web" | "schedule"
#
# Custom variables (can be overridden in manual/scheduled pipelines):
#   RUN_CHECKS       - "true" | "false"  (default: "true")
#   DEPLOY_ENV       - "QA"  | "PROD"    (default: "QA")

variables:
  NODE_VERSION: "22"
  PNPM_VERSION: "10"
  RUN_CHECKS: "true"
  DEPLOY_ENV: "QA"

# ---------------------------------------------------------------------------
# Pipeline-level rules (equivalent to GitHub Actions "on:" triggers)
# - push to main, ignoring changes only in docs/
# - merge request targeting main, ignoring changes only in docs/
# - manual trigger (web UI)  → CI_PIPELINE_SOURCE == "web"
# - scheduled pipeline       → CI_PIPELINE_SOURCE == "schedule"
# ---------------------------------------------------------------------------
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"
      changes:
        paths:
          - "**"
        compare_to: "refs/heads/main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - when: never

# ---------------------------------------------------------------------------
# Shared configuration – caching the pnpm store across all jobs
# ---------------------------------------------------------------------------
default:
  image: node:${NODE_VERSION}
  before_script:
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm config set store-dir .pnpm-store
    - pnpm install
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store/

stages:
  - build
  - verify
  - deploy

# ---------------------------------------------------------------------------
# build — always runs; artifact kept 7 days
# (equivalent to the "build" job that runs on every trigger)
# ---------------------------------------------------------------------------
build:
  stage: build
  script:
    - pnpm build
  artifacts:
    paths:
      - .output/
    expire_in: 7 days

# ---------------------------------------------------------------------------
# verify jobs — run in parallel after build
# Conditions mirror GitHub Actions:
#   - every merge request
#   - manual dispatch when RUN_CHECKS is "true"
#   - scheduled pipeline
# ---------------------------------------------------------------------------
lint:
  stage: verify
  needs:
    - job: build
      artifacts: false
  script:
    - pnpm lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web" && $RUN_CHECKS == "true"
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - when: never

typecheck:
  stage: verify
  needs:
    - job: build
      artifacts: false
  script:
    - pnpm typecheck
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web" && $RUN_CHECKS == "true"
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - when: never

test:
  stage: verify
  needs:
    - job: build
      artifacts: false
  script:
    - pnpm test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web" && $RUN_CHECKS == "true"
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - when: never

# ---------------------------------------------------------------------------
# deploy — only on manual trigger, uses DEPLOY_ENV variable
# (equivalent to the "deploy" job with workflow_dispatch)
# Configure scheduled pipelines in GitLab → CI/CD → Schedules
# ---------------------------------------------------------------------------
deploy:
  stage: deploy
  needs:
    - job: build
      artifacts: true
  script:
    - echo "Deploying to $DEPLOY_ENV"
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
    - when: never
